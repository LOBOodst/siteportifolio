<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hosch Alef | Game Programmer & Systems Designer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;700;900&display=swap');
        
        :root { --bg: #050505; --accent: #3b82f6; }
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg); 
            color: #a1a1aa; 
            background-image: radial-gradient(circle at 50% -20%, #1e1e24 0%, transparent 50%);
        }

        .mono { font-family: 'JetBrains Mono', monospace; }
        .hero-title { font-weight: 900; letter-spacing: -0.06em; line-height: 0.8; }
        
        .glass { background: rgba(13, 13, 15, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        
        /* Correção de Filtro para VS Code */
        .project-card { transition: all 0.5s cubic-bezier(0.2, 0.8, 0.2, 1); cursor: pointer; border: 1px solid #141417; background: #08080a; }
        .project-card:hover { border-color: var(--accent); transform: translateY(-8px); }
        
        .card-img, .gallery-img { 
            filter: grayscale(100%); 
            transition: 0.6s ease; 
            width: 100%; 
            object-fit: cover; 
        }
        .project-card:hover .card-img, .gallery-img:hover { filter: grayscale(0%); }

        .profile-photo { filter: grayscale(100%); transition: 0.5s ease; border: 2px solid #141417; }
        .profile-photo:hover { filter: grayscale(0%); border-color: var(--accent); }

        .page-transition { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="app" class="max-w-6xl mx-auto px-6 py-10"></div>

    <script>
        const config = {
            profile: {
                name: "Hosch Alef",
                role: "Game Programmer & Systems Designer",
                photo: "images/photo_portifolio.png",
                bio: "Estudante de Bacharelado em Desenvolvimento de Jogos. Vejo a programação como uma arte capaz de materializar mundos e sistemas complexos.",
                linkedin: "https://www.linkedin.com/in/alefhosch/",
                github: "https://github.com/LOB-workshop",
                email: "mailto:alefhosch@exemplo.com"
            },
            skills: [
                { n: "Python", l: "Advanced", c: "text-red-500" },
                { n: "C#", l: "Intermediate", c: "text-purple-500" },
                { n: "Unity", l: "Intermediate", c: "text-purple-500" },
                { n: "Unreal", l: "Intermediate", c: "text-purple-500" },
                { n: "HTML/CSS", l: "Advanced", c: "text-red-500" }
            ],
            projects: [
                {
                    id: "shadow-of-orum",
                    title: "Shadow of Orum",
                    role: "Solo Developer",
                    type: "Featured / Action-RPG",
                    images: ["images/tsukimaru_dialogue_02.jpg"], 
                    shortDesc: "RPG de ação sombrio baseado na mitologia Afro-Brasileira.",
                    fullDesc: `Sistemas de combate souls-like com mecânicas de sacrifício de HP em co-op local.`,
                    tech: ["Unreal Engine", "C++", "Systems"],
                    links: { github: "#", demo: "#" },
                    featured: true
                },
                {
                    id: "shogi-system",
                    title: "Tsukimaru - Shogi",
                    role: "Systems Programmer",
                    type: "Logic / Strategy",
                    images: ["images/tsukimaru_shogi_01.jpg", "images/tsukimaru_shogi_02.jpg"],
                    shortDesc: "Implementação 3D completa de Shogi.",
                    fullDesc: `Foco em lógica determinística e validação de movimentos complexos e sistema de drop.`,
                    tech: ["Unreal Engine", "Math", "States"],
                    links: { github: "#", demo: "#" }
                },
                {
                    id: "dialogue-system",
                    title: "Tsukimaru - Dialogue",
                    role: "Gameplay Programmer",
                    type: "Narrative Systems",
                    images: ["images/tsukimaru_dialogue_01.jpg", "images/tsukimaru_dialogue_02.jpg"],
                    shortDesc: "Sistema de diálogo dinâmico orientado a dados.",
                    fullDesc: `Ferramenta modular para criação de conversas não-lineares.`,
                    tech: ["Blueprints", "Data Driven"],
                    links: { github: "#", demo: "#" }
                },
                {
                    id: "datacrash",
                    title: "DataCrash",
                    role: "Lead Programmer",
                    type: "Game Jam Project",
                    images: ["images/datacrash_page.png"],
                    shortDesc: "Survival game frenético criado em 72 horas.",
                    fullDesc: `Demonstração de agilidade técnica e polimento sob pressão.`,
                    tech: ["Unity", "C#", "Fast Prototype"],
                    links: { github: "#", demo: "https://loboodst.itch.io/datacrash" }
                },
                {
                    id: "pirate-aim",
                    title: "Pirate Aim",
                    role: "Programmer",
                    type: "Team Project",
                    images: ["images/pirate_aim_01.jpg", "images/pirate_aim_02.jpg", "images/pirate_aim_03.jpg", "images/pirate_aim_04.jpg"],
                    shortDesc: "Coleção de microgames colaborativa.",
                    fullDesc: `Coordenação de sistemas e integração de assets em equipa.`,
                    tech: ["C#", "Unity", "Teamwork"],
                    links: { github: "#", demo: "https://drive.google.com/file/d/1yGat7C6ub7AYErfETQ637Ha_l83bpV5c/view" }
                }
            ]
        };

        const render = () => {
            const hash = window.location.hash.replace('#', '');
            const app = document.getElementById('app');
            if (!hash || hash === 'home') app.innerHTML = renderHome();
            else {
                const project = config.projects.find(p => p.id === hash);
                app.innerHTML = project ? renderProjectDetail(project) : renderHome();
            }
            lucide.createIcons();
        };

        const renderHome = () => `
            <div class="page-transition">
                <nav class="flex justify-between items-center mb-24 glass p-4 px-8 rounded-full">
                    <div class="mono text-xs font-bold tracking-[0.4em] text-zinc-600 uppercase">Hosch.Sys_v5.7</div>
                    <div class="flex gap-6 items-center">
                        <a href="${config.profile.github}" target="_blank"><i data-lucide="github" size="18"></i></a>
                        <a href="${config.profile.linkedin}" target="_blank"><i data-lucide="linkedin" size="18"></i></a>
                    </div>
                </nav>

                <header class="mb-32 grid grid-cols-1 md:grid-cols-12 gap-10 items-center">
                    <div class="md:col-span-3 text-center">
                        <img src="${config.profile.photo}" class="profile-photo w-48 h-48 object-cover rounded-xl mx-auto">
                    </div>
                    <div class="md:col-span-9 text-left">
                        <h1 class="hero-title text-7xl md:text-[10rem] text-white uppercase leading-none mb-6">HOSCH<br><span class="text-blue-600">ALEF</span></h1>
                        <p class="text-xl text-zinc-500 italic border-l-2 border-blue-600/30 pl-6">"${config.profile.bio}"</p>
                    </div>
                </header>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-24">
                    ${config.projects.map(p => `
                        <div onclick="window.location.hash='${p.id}'" class="project-card rounded-2xl overflow-hidden ${p.featured ? 'md:col-span-2' : ''}">
                            <img src="${p.images[0]}" class="card-img h-64">
                            <div class="p-8">
                                <h3 class="text-3xl font-black text-white mb-4 uppercase">${p.title}</h3>
                                <p class="text-zinc-500 text-sm mb-6">${p.shortDesc}</p>
                                <div class="flex flex-wrap gap-2">
                                    ${p.tech.map(t => `<span class="mono text-[8px] bg-zinc-900 px-3 py-1 text-zinc-400 rounded-full font-bold uppercase">${t}</span>`).join('')}
                                </div>
                            </div>
                        </div>
                    `).join('')}
                </div>
            </div>
        `;

        const renderProjectDetail = (p) => `
            <div class="page-transition">
                <button onclick="window.location.hash='home'" class="flex items-center gap-2 text-zinc-500 hover:text-white mb-12 mono text-xs font-bold uppercase tracking-widest">
                    <i data-lucide="chevron-left" size="18"></i> Back
                </button>
                <div class="grid grid-cols-1 lg:grid-cols-12 gap-16">
                    <div class="lg:col-span-8">
                        <h1 class="text-6xl md:text-8xl font-black text-white uppercase mb-12 leading-none">${p.title}</h1>
                        <div class="text-zinc-400 text-xl leading-relaxed mb-16">${p.fullDesc}</div>
                        
                        <div class="grid grid-cols-1 gap-6">
                            ${p.images.map(img => `
                                <div class="rounded-2xl overflow-hidden border border-zinc-800">
                                    <img src="${img}" class="gallery-img w-full">
                                </div>
                            `).join('')}
                        </div>
                    </div>
                    <div class="lg:col-span-4">
                        <div class="glass p-10 rounded-3xl sticky top-10 border-blue-500/10">
                            <h3 class="mono text-white text-[10px] uppercase font-black tracking-[0.5em] mb-10 border-b border-white/5 pb-4">Metadata</h3>
                            <div class="space-y-8">
                                <div><p class="text-[9px] text-zinc-600 uppercase font-bold mb-2">Role</p><p class="text-white font-bold uppercase">${p.role}</p></div>
                                <div><p class="text-[9px] text-zinc-700 uppercase mb-3 font-bold">Stack</p>
                                    <div class="flex flex-wrap gap-2">
                                        ${p.tech.map(t => `<span class="mono text-[9px] bg-blue-600/10 text-blue-400 px-3 py-1 rounded-full uppercase font-black">${t}</span>`).join('')}
                                    </div>
                                </div>
                                <div class="pt-10 flex gap-6 border-t border-white/5">
                                    <a href="${p.links.github}" class="text-white hover:text-blue-500"><i data-lucide="github" size="22"></i></a>
                                    ${p.links.demo !== '#' ? `<a href="${p.links.demo}" class="text-white hover:text-blue-500 flex items-center gap-2 text-xs font-bold uppercase tracking-widest">Demo <i data-lucide="external-link" size="16"></i></a>` : ''}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        `;

        window.addEventListener('hashchange', render);
        window.addEventListener('load', render);
    </script>
</body>
</html>
