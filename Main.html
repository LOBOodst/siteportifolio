      :root { --bg: #050505; --accent: #3b82f6; --glass-bg: rgba(13, 13, 15, 0.6); --glass-border: rgba(255, 255, 255, 0.05); }
      body { font-family: "Inter", sans-serif; background-color: var(--bg); color: #a1a1aa; background-image: radial-gradient(circle at 50% -20%, #1e1e24 0%, transparent 60%); background-attachment: fixed; -webkit-font-smoothing: antialiased; }

      .profile-photo:hover { filter: grayscale(0%); border-color: var(--accent); }
      .reveal { opacity: 0; transform: translateY(30px); transition: 0.8s all cubic-bezier(0.2, 0.8, 0.2, 1); }
      .reveal.active { opacity: 1; transform: translateY(0); }
      .page-transition { animation: fadeIn 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
      @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
      ::-webkit-scrollbar { width: 8px; }
      ::-webkit-scrollbar-track { background: var(--bg); }
      ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

                <p class="mono text-[10px] text-zinc-600 uppercase tracking-widest">© ${new Date().getFullYear()} Hosch Alef // Game Programmer // ${t.location}</p>
            </footer>
        </div>
      `;

      const renderProjectDetail = (p, t) => `
        <div class="page-transition">
            <button onclick="window.location.hash='home'" class="flex items-center gap-2 text-zinc-500 hover:text-white transition mono text-[11px] uppercase font-bold mb-12">
                <i data-lucide="chevron-left" size="16"></i> ${t.backBtn}
            </button>
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-16">
                <div class="lg:col-span-8">
                    <span class="mono text-[10px] text-blue-500 bg-blue-500/10 border border-blue-500/20 px-3 py-1 rounded-full uppercase font-bold mb-6 inline-block">${p.type}</span>
                    <h1 class="text-5xl md:text-7xl font-black text-white uppercase leading-none mb-12">${p.title}</h1>
                    <div class="text-zinc-400 text-lg leading-relaxed mb-16 prose prose-invert max-w-none">
                        ${p.fullDesc[currentLang]}
                    </div>
                    <div class="space-y-10">
                        ${p.images.map(img => `<img src="${img}" class="gallery-img rounded-2xl border border-zinc-800 shadow-2xl">`).join("")}
                    </div>
                </div>
                <aside class="lg:col-span-4">
                    <div class="glass p-10 rounded-3xl sticky top-10 border-blue-500/10">
                        <h3 class="mono text-white text-[10px] uppercase font-bold tracking-widest mb-8 border-b border-white/5 pb-4">${t.techSheet}</h3>
                        <div class="space-y-8">
                            <div><p class="text-[10px] text-zinc-600 uppercase font-bold mb-2 tracking-widest">${t.mainRole}</p><p class="text-white font-bold uppercase text-sm">${p.role}</p></div>
                            <div><p class="text-[10px] text-zinc-600 uppercase font-bold mb-3 tracking-widest">Stack</p><div class="flex flex-wrap gap-2">${p.tech.map(tech => `<span class="mono text-[9px] bg-blue-600/10 text-blue-400 px-3 py-1 rounded-full border border-blue-500/10 font-bold uppercase">${tech}</span>`).join("")}</div></div>
                        </div>
                        <div class="mt-10 pt-10 border-t border-white/5 space-y-4">
                             ${p.links.github !== "#" ? `<a href="${p.links.github}" target="_blank" class="bg-zinc-800 text-white p-3 rounded-full hover:bg-blue-600 transition flex items-center justify-center gap-2 text-xs uppercase font-bold"><i data-lucide="github" size="18"></i> GitHub</a>` : ""}
                             ${p.links.demo !== "#" ? `<a href="${p.links.demo}" target="_blank" class="bg-white text-black px-6 py-4 rounded-full hover:bg-blue-600 hover:text-white transition flex items-center gap-2 text-[11px] font-bold uppercase tracking-widest justify-center shadow-lg">${t.viewProject} <i data-lucide="external-link" size="16"></i></a>` : ""}
                        </div>
                    </div>
                </aside>
            </div>
        </div>
      `;

      const initScrollReveal = () => {
        const reveals = document.querySelectorAll(".reveal");
        const observer = new IntersectionObserver((entries) => {
          entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add("active"); });
        }, { threshold: 0.1 });
        reveals.forEach(el => observer.observe(el));
      };
      window.addEventListener("hashchange", render);
      window.addEventListener("load", render);
    </script>
  </body>
</html>
