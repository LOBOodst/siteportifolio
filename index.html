      :root {

        --accent-yellow: #facc15;
        --accent-blue: #3b82f6;
        --accent-purple: #a855f7;
        --glass-bg: rgba(10, 10, 12, 0.85);
      }

        font-family: "Inter", sans-serif;
        background-color: var(--bg-pure);
        color: #e2e8f0;
        /* Fundo com efeito de profundidade e cores harmônicas */
        background-image:

            circle at 0% 0%,
            rgba(59, 130, 246, 0.15) 0%,
            transparent 35%
          ),

            circle at 100% 100%,
            rgba(168, 85, 247, 0.15) 0%,
            transparent 35%
          ),

        background-attachment: fixed;
        -webkit-font-smoothing: antialiased;
      }

      .mono {
        font-family: "JetBrains Mono", monospace;
      }

      .glass {
        background: var(--glass-bg);
        backdrop-filter: blur(24px);
        border: 1px solid rgba(255, 255, 255, 0.08);
      }

      /* Título Principal com Gradiente Vivo */
      .gradient-text {
        background: linear-gradient(
          to right,
          var(--accent-blue),
          var(--accent-purple),
          var(--accent-yellow)
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        font-weight: 900;
      }

      /* Botões e Destaques */
      .lang-btn.active {
        background: var(--accent-yellow);
        color: black;
        box-shadow: 0 0 20px rgba(250, 204, 21, 0.3);
      }

      .profile-photo {
        border: 3px solid var(--accent-purple);
        box-shadow: 0 0 50px rgba(168, 85, 247, 0.2);
      }

      /* Scrollbar temática */
      ::-webkit-scrollbar-thumb {
        background: linear-gradient(var(--accent-blue), var(--accent-purple));
        border-radius: 5px;
      }
    </style>

                        ${p.images.map((img) => `<img src="${img}" class="rounded-3xl w-full border-2 border-white/5 shadow-2xl">`).join("")}
                    </div>
                </div>
                <aside class="lg:col-span-4">
                    <div class="glass p-10 rounded-[2.5rem] sticky top-10 border-blue-500/20">
                        <h3 class="mono text-blue-500 text-xs font-black uppercase tracking-widest mb-10 border-b border-white/5 pb-4">${t.techSheet}</h3>
                        <div class="space-y-8">
                            <div><p class="text-[10px] text-zinc-600 uppercase font-black mb-2">${t.mainRole}</p><p class="text-white font-black uppercase">${p.role}</p></div>
                            <div><p class="text-[10px] text-zinc-600 uppercase font-black mb-3">Stack</p><div class="flex flex-wrap gap-2">${p.tech.map((tech) => `<span class="mono text-[9px] bg-yellow-400 text-black px-3 py-1 rounded-md font-black uppercase">${tech}</span>`).join("")}</div></div>
                            <div><p class="text-[10px] text-zinc-600 uppercase font-black mb-2">Comms</p><a href="${config.profile.discord}" target="_blank" class="text-purple-500 font-black uppercase text-xs mono hover:underline">${config.profile.discordTag}</a></div>
                        </div>
                        ${p.links.demo !== "#" ? `<a href="${p.links.demo}" target="_blank" class="mt-12 w-full bg-blue-600 text-white py-5 rounded-2xl font-black uppercase flex justify-center items-center gap-3 hover:bg-yellow-400 hover:text-black transition-all">${t.viewProject} <i data-lucide="zap"></i></a>` : ""}
                    </div>
                </aside>
            </div>
        </div>
      `;

      const initScrollReveal = () => {
        const reveals = document.querySelectorAll(".reveal");
        const observer = new IntersectionObserver(
          (entries) => {
            entries.forEach((entry) => {
              if (entry.isIntersecting) entry.target.classList.add("active");
            });
          },
          { threshold: 0.1 },
        );
        reveals.forEach((el) => observer.observe(el));
      };

      window.addEventListener("hashchange", render);
      window.addEventListener("load", render);
    </script>
  </body>
</html>
