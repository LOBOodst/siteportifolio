      };

      const updateMascotPosition = () => {
        const mascot = document.getElementById("character-mascot");
        if (!mascot) return;

        const scrollProgress = window.scrollY / (document.documentElement.scrollHeight - window.innerHeight);
        
        // Calcular posição X baseado no scroll (esquerda -> direita -> esquerda)
        let targetX;
        if (scrollProgress < 0.33) {
          // Primeira seção: esquerda
          targetX = 20 + (scrollProgress * 100);
        } else if (scrollProgress < 0.66) {
          // Seção do meio: direita
          targetX = window.innerWidth - (window.innerWidth < 768 ? 90 : 170) - ((scrollProgress - 0.33) * 100);
        } else {
          // Última seção: volta para esquerda
          targetX = 20 + ((scrollProgress - 0.66) * 100);
        }

        // Calcular posição Y (sobe quando scrolla)
        const targetY = Math.max(100, window.innerHeight - 170 - (scrollProgress * 300));

        // Determinar direção (flip)
        const newFlipped = targetX > mascotState.x;
        if (newFlipped !== mascotState.isFlipped) {
          mascotState.isFlipped = newFlipped;
          mascot.classList.toggle("flip", newFlipped);
        }

        mascotState.targetX = targetX;
        mascotState.targetY = targetY;

        // Detectar seção atual e fazer mascote reagir
        detectCurrentSection();
      };

      const updateMascotReaction = (e) => {
        const mascot = document.getElementById("character-mascot");
        if (!mascot) return;

        const mouseX = e.clientX;
        const mouseY = e.clientY;

        // Se o mouse está perto do mascote, ele pula
        const mascotX = mascotState.x + 60;
        const mascotY = mascotState.y + 60;
        
        const distance = Math.sqrt(
          Math.pow(mouseX - mascotX, 2) + Math.pow(mouseY - mascotY, 2)
        );

        if (distance < 150) {
          // Mouse está perto - mascote pula
          mascot.classList.add("excited");
          setTimeout(() => {
            mascot.classList.remove("excited");
          }, 600);
        }
      };

      const detectCurrentSection = () => {
        const scrollProgress = window.scrollY / (document.documentElement.scrollHeight - window.innerHeight);
        let newSection = "home";

        if (scrollProgress > 0.25) newSection = "tech";
        if (scrollProgress > 0.4) newSection = "profile";
        if (scrollProgress > 0.65) newSection = "projects";
        if (scrollProgress > 0.85) newSection = "contact";

        if (newSection !== mascotState.currentSection) {
          mascotState.currentSection = newSection;
          triggerMascotReaction(newSection);
        }
      };

      const triggerMascotReaction = (section) => {
        const mascot = document.getElementById("character-mascot");
        if (!mascot) return;

        const reactions = {
          en: {
            tech: "Love the stack! 🔥",
            profile: "That's me! 😎",
            projects: "My best work! 💪",
            contact: "Let's talk! 🤝"
          },
          pt: {
            tech: "Amo essa stack! 🔥",
            profile: "Esse sou eu! 😎",
            projects: "Meus melhores projetos! 💪",
            contact: "Vamos conversar! 🤝"
          },
          fr: {
            tech: "J'adore cette stack! 🔥",
            profile: "C'est moi! 😎",
            projects: "Mon meilleur travail! 💪",
            contact: "Parlons! 🤝"
          }
        };

        // Fazer mascote pular quando entra numa nova seção
        mascot.classList.remove("excited");
        void mascot.offsetWidth; // Trigger reflow
        mascot.classList.add("excited");

        // Mostrar mensagem
        if (section !== "home") {
          const message = reactions[currentLang][section] || "Bem-vindo!";
          showCharacterMessage(message);
          setTimeout(() => {
            hideCharacterMessage();
          }, 2500);
        }
      };

      const animateMascot = () => {
        const mascot = document.getElementById("character-mascot");
        if (!mascot) return;

        // Suavemente mover mascote para posição alvo
        mascotState.x += (mascotState.targetX - mascotState.x) * 0.1;
        mascotState.y += (mascotState.targetY - mascotState.y) * 0.1;

        mascot.style.transform = `translate(${mascotState.x}px, ${mascotState.y - window.innerHeight + 120}px)`;
        
        requestAnimationFrame(animateMascot);
      };

      let currentTourStep = 0;
      const startTour = () => {
        const hash = window.location.hash.replace("#", "");
        if (hash && hash !== 'home' && hash !== 'contact') {
          window.location.hash = 'home';
          setTimeout(executeTour, 500);
        } else {
          executeTour();
        }
      };

      const executeTour = () => {
        currentTourStep = 0;
        document.getElementById('tour-bubble').style.display = 'block';
        showTourStep();
      };

      const showTourStep = () => {
        const t = translations[currentLang].tour;
        const bubble = document.getElementById('tour-bubble');
        const steps = [
          { id: 'tour-start', text: t.step0 },
          { id: 'tour-stack', text: t.step1 },
          { id: 'tour-profile', text: t.step2 },
          { id: 'tour-projects', text: t.step3 },
          { id: 'contact', text: t.step4 }
        ];

        const step = steps[currentTourStep];
        const target = document.getElementById(step.id);
        
        // Limpar destaques anteriores
        document.querySelectorAll('.highlight-target').forEach(el => el.classList.remove('highlight-target'));
        
        if (target) {
          target.scrollIntoView({ behavior: 'smooth', block: 'center' });
          target.classList.add('highlight-target');
        }

        const isLast = currentTourStep === steps.length - 1;

        bubble.innerHTML = `
          <div class="mono text-[10px] text-emerald-400 mb-2 uppercase tracking-widest">HOSCH.GUIDE_V1</div>
          <p class="text-white text-sm leading-relaxed mb-4">${step.text}</p>
          <button onclick="${isLast ? 'endTour()' : 'nextTourStep()'}" class="w-full bg-emerald-500 text-black py-2 rounded-lg font-black uppercase text-[10px] tracking-widest hover:bg-white transition-colors">
            ${isLast ? t.finish : t.next}
          </button>
        `;
      };

      const nextTourStep = () => { currentTourStep++; showTourStep(); };
      const endTour = () => {
        document.getElementById('tour-bubble').style.display = 'none';
        document.querySelectorAll('.highlight-target').forEach(el => el.classList.remove('highlight-target'));
      };

      const initGlassGlow = () => {
        const cards = document.querySelectorAll(".glass-interactive");
        cards.forEach((card) => {
          card.addEventListener("mousemove", (e) => {
            const rect = card.getBoundingClientRect();
            const x = ((e.clientX - rect.left) / card.clientWidth) * 100;
            const y = ((e.clientY - rect.top) / card.clientHeight) * 100;
            card.style.setProperty("--mouse-x", `${x}%`);
            card.style.setProperty("--mouse-y", `${y}%`);
          });
        });
      };

      const copyDiscord = (btn) => {
        navigator.clipboard.writeText(config.profile.discordTag);
        const originalText = btn.innerHTML;
        btn.innerHTML = `<i data-lucide="check"></i> ${translations[currentLang].copySuccess}`;
        btn.classList.add('copy-feedback');
        lucide.createIcons();
        setTimeout(() => { btn.innerHTML = originalText; btn.classList.remove('copy-feedback'); lucide.createIcons(); }, 2000);
      };

      window.addEventListener("hashchange", render);
      window.addEventListener("load", render);
    </script>
  </body>
</html>
